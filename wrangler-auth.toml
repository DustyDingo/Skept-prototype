name = "skept-auth"
main = "auth-worker.js"
compatibility_date = "2026-06-25"

# ── KV namespace binding ───────────────────────────────────────────────────
# Stores session tokens (session:{uuid}) and magic link rate limit counters
# (ratelimit:magic:{email_hash}).
#
# Create with:
#   wrangler kv:namespace create AUTH_SESSIONS --config wrangler-auth.toml
#   wrangler kv:namespace create AUTH_SESSIONS --preview --config wrangler-auth.toml
# Paste both returned ids below.
[[kv_namespaces]]
binding    = "AUTH_SESSIONS"
id         = "REPLACE_WITH_KV_ID"
preview_id = "REPLACE_WITH_PREVIEW_KV_ID"

# ── D1 database binding ────────────────────────────────────────────────────
# skept-auth database: users, auth_tokens, tombstones.
#
# Create with:
#   wrangler d1 create skept-auth --config wrangler-auth.toml
# Run schema:
#   wrangler d1 execute skept-auth --file=./skept_d1_schema_auth.sql --config wrangler-auth.toml
# Paste returned database_id below.
[[d1_databases]]
binding       = "SKEPT_AUTH_DB"
database_name = "skept-auth"
database_id   = "REPLACE_WITH_D1_ID"

# ── Production route ───────────────────────────────────────────────────────
# Uncomment after skept.co zone is confirmed active on Cloudflare.
# [[routes]]
# pattern   = "skept.co/api/auth/*"
# zone_name = "skept.co"

# ── Observability ──────────────────────────────────────────────────────────
[observability]
enabled = true

# ── Secrets ────────────────────────────────────────────────────────────────
# Never hardcode. Set once with:
#
#   wrangler secret put RESEND_API_KEY --config wrangler-auth.toml
#
#   wrangler secret put ENCRYPTION_KEY --config wrangler-auth.toml
#     Generate: openssl rand -hex 32   (64-char hex string, 32 bytes — AES-256-GCM)
#
#   wrangler secret put IP_SALT --config wrangler-auth.toml
#     Generate: openssl rand -hex 32

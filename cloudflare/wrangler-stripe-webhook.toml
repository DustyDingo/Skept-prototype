name = "skept-stripe-webhook"
main = "cloudflare/stripe-webhook-worker.js"
compatibility_date = "2026-04-27"

[[d1_databases]]
binding = "SKEPT_AUTH_DB"
database_name = "skept-auth"
database_id = "b81343be-4703-4d26-959e-46781843d563"

# [[routes]] — uncomment when wiring skept.co/api/webhooks/stripe
# pattern = "skept.co/api/webhooks/stripe"
# zone_name = "skept.co"

# Secrets — set via `wrangler secret put --config cloudflare/wrangler-stripe-webhook.toml`, do NOT commit:
#   wrangler secret put STRIPE_WEBHOOK_SECRET  --config cloudflare/wrangler-stripe-webhook.toml
#   wrangler secret put STRIPE_SECRET_KEY      --config cloudflare/wrangler-stripe-webhook.toml

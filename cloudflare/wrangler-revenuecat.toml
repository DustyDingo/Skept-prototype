name = "skept-revenuecat-webhook"
main = "cloudflare/revenuecat-webhook-worker.js"
compatibility_date = "2026-04-27"

[[d1_databases]]
binding = "SKEPT_AUTH_DB"
database_name = "skept-auth"
database_id = "b81343be-4703-4d26-959e-46781843d563"

# [[routes]] — uncomment when wiring skept.co/api/webhooks/revenuecat
# pattern = "skept.co/api/webhooks/revenuecat"
# zone_name = "skept.co"

# Secrets — set via `wrangler secret put --config cloudflare/wrangler-revenuecat.toml`, do NOT commit:
#   wrangler secret put REVENUECAT_WEBHOOK_SECRET  --config cloudflare/wrangler-revenuecat.toml
#   wrangler secret put REVENUECAT_PRODUCT_TIERS   --config cloudflare/wrangler-revenuecat.toml

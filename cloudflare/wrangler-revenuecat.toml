name = "skept-revenuecat-webhook"
main = "revenuecat-webhook-worker.js"
compatibility_date = "2026-04-27"

[[d1_databases]]
binding = "SKEPT_AUTH_DB"
database_name = "skept-auth"
database_id = "b81343be-4703-4d26-959e-46781843d563"

[[d1_databases]]
binding = "SKEPT_ANALYSIS_DB"
database_name = "skept-analysis"
database_id = "f1c17fe3-fd52-48cb-a22c-f4658918e301"

# [[routes]] — uncomment when registering endpoint URL in RevenueCat dashboard
# Endpoint: POST /webhook  (X-RevenueCat-Webhook-Signature HMAC-SHA256 verified)
# pattern = "skept.co/api/webhooks/revenuecat"
# zone_name = "skept.co"

# Secrets — set via `wrangler secret put --config cloudflare/wrangler-revenuecat.toml`, do NOT commit:
#   wrangler secret put RC_HMAC_SECRET  --config cloudflare/wrangler-revenuecat.toml

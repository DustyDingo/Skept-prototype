<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skept — Settings</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --amber: #DFB87B; --amber-light: #F5E6C8; --ink: #1A1A1A;
      --gray: #4A4A4A; --soft: #8A8A8A; --cream: #FAF8F5; --rule: #E0E0E0;
      --green: #2D7A4F; --green-bg: #EBF5EF; --red: #C0392B; --red-bg: #FDECEA;
    }
    body { font-family: Calibri, Arial, sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; }
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(250,248,245,0.94); backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--rule); padding: 0 28px;
      height: 52px; display: flex; align-items: center; justify-content: space-between;
    }
    .wordmark {
      font-family: 'Palatino Linotype', Palatino, serif;
      font-style: italic; font-size: 22px; color: var(--amber); text-decoration: none;
    }
    .nav-right { display: flex; align-items: center; gap: 16px; }
    .nav-tier {
      font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--amber); border: 1px solid var(--amber); padding: 2px 8px; border-radius: 3px;
    }
    .nav-link { font-size: 13px; color: var(--gray); text-decoration: none; }
    .nav-link:hover { color: var(--ink); }
    main { max-width: 560px; margin: 0 auto; padding: 48px 24px 96px; }
    h1 { font-size: 26px; font-weight: 600; margin-bottom: 32px; }
    .section {
      background: white; border: 1px solid var(--rule); border-radius: 8px;
      padding: 20px 22px; margin-bottom: 16px;
    }
    .section-title {
      font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--soft); margin-bottom: 16px;
    }
    .field-row { margin-bottom: 14px; }
    label { display: block; font-size: 13px; font-weight: 600; color: var(--gray); margin-bottom: 6px; }
    input[type="text"] {
      width: 100%; padding: 10px 12px;
      border: 1.5px solid var(--rule); border-radius: 6px;
      font-family: Calibri, Arial, sans-serif; font-size: 14px; color: var(--ink);
      background: white; outline: none; transition: border-color 0.15s;
    }
    input[type="text"]:focus { border-color: var(--amber); }
    .readonly-val { font-size: 14px; color: var(--gray); padding: 2px 0; }
    .btn {
      display: inline-block; padding: 10px 20px;
      border-radius: 6px; font-family: Calibri, Arial, sans-serif;
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: all 0.15s; border: 1.5px solid var(--ink);
      background: var(--ink); color: white;
    }
    .btn:hover { opacity: 0.85; }
    .btn.secondary {
      background: none; color: var(--ink);
    }
    .btn.secondary:hover { background: var(--ink); color: white; }
    .btn.danger {
      border-color: var(--red); background: none; color: var(--red);
    }
    .btn.danger:hover { background: var(--red); color: white; }
    .btn.ghost {
      border-color: var(--rule); background: none; color: var(--soft);
    }
    .btn.ghost:hover { border-color: var(--gray); color: var(--ink); }
    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .error-box {
      display: none; padding: 12px 14px; margin-bottom: 16px;
      background: var(--red-bg); border: 1px solid #C0392B30;
      border-radius: 6px; font-size: 13px; color: var(--red);
    }
    .success-box {
      display: none; padding: 12px 14px; margin-bottom: 16px;
      background: var(--green-bg); border: 1px solid #2D7A4F30;
      border-radius: 6px; font-size: 13px; color: var(--green);
    }
  </style>
</head>
<body>
<nav>
  <a class="wordmark" href="/verify.html">Skept</a>
  <div class="nav-right">
    <span class="nav-tier" id="user-tier"></span>
    <a class="nav-link" href="/verify.html">Verify</a>
    <a class="nav-link" href="/history.html">History</a>
  </div>
</nav>

<main>
  <h1>Settings</h1>

  <div class="error-box" id="error-box"></div>
  <div class="success-box" id="success-box"></div>

  <div class="section">
    <div class="section-title">Account</div>
    <div class="field-row">
      <label for="display-name">Display name</label>
      <input type="text" id="display-name" placeholder="Your name" maxlength="64">
    </div>
    <div class="field-row">
      <label>Email</label>
      <div class="readonly-val" id="email-display">—</div>
    </div>
    <div class="field-row">
      <label>Plan</label>
      <div class="readonly-val" id="tier-display">—</div>
    </div>
    <button class="btn" id="save-btn">Save</button>
  </div>

  <div class="section">
    <div class="section-title">Data</div>
    <div class="btn-row">
      <button class="btn secondary" id="export-btn">Export my data</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Session</div>
    <div class="btn-row">
      <button class="btn ghost" id="logout-btn">Sign out</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Danger zone</div>
    <div class="btn-row">
      <button class="btn danger" id="delete-btn">Delete account</button>
    </div>
  </div>
</main>

<script type="module" src="/src/pages/settings.js"></script>
</body>
</html>

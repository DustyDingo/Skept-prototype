<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skept — Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sorts+Mill+Goudy:ital,wght@0,400;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --amber:          #b87400;
      --amber-warm:     #c07800;
      --amber-soft:     rgba(184,116,0,0.09);
      --amber-border:   rgba(184,116,0,0.25);
      --ink:            #1a1a1a;
      --ink-soft:       #5a5a5a;
      --ink-softer:     #8a8a8a;
      --rule:           #e8e4db;
      --rule-soft:      #f0ece2;
      --bg:             #faf8f3;
      --card:           #ffffff;
      --goudy:          'Sorts Mill Goudy', Georgia, serif;
      --ui:             'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --amber-light:    #F5E6C8;
      --gray:           #4A4A4A;
      --soft:           #8A8A8A;
      --cream:          #FAF8F5;
      --green:          #2D7A4F;
      --green-bg:       #EBF5EF;
      --red:            #C0392B;
      --red-bg:         #FDECEA;
    }
    body { font-family: Calibri, Arial, sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; display: flex; flex-direction: column; }

    /* ── NAV ── */
    .skept-nav {
      position: sticky;
      top: 0;
      z-index: 200;
      height: 56px;
      background: rgba(250,248,243,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--rule);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 0;
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 9px;
      text-decoration: none;
      color: var(--ink);
      flex-shrink: 0;
    }
    .nav-logo svg { display: block; }
    .nav-wordmark {
      font-family: var(--goudy);
      font-style: italic;
      font-size: 21px;
      line-height: 1;
      color: var(--ink);
      letter-spacing: -0.01em;
    }
    .nav-spacer { flex: 1; }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .nav-link {
      font-size: 13.5px;
      font-weight: 400;
      color: var(--ink-soft);
      text-decoration: none;
      padding: 6px 12px;
      border-radius: 5px;
      transition: color 0.15s, background 0.15s;
      white-space: nowrap;
      cursor: pointer;
      background: none;
      border: none;
      font-family: var(--ui);
      line-height: 1;
    }
    .nav-link:hover { color: var(--ink); background: rgba(0,0,0,0.04); }
    .nav-link.active { color: var(--amber); font-weight: 500; }
    .nav-link--signin {
      color: var(--ink);
      font-weight: 500;
      border: 1px solid var(--rule);
      background: var(--card);
    }
    .nav-link--signin:hover {
      border-color: var(--amber-border);
      background: var(--card);
      color: var(--ink);
    }
    .nav-auth   { display: none; }
    .nav-unauth { display: none; }
    body[data-auth="true"]  .nav-auth   { display: flex; align-items: center; gap: 4px; }
    body[data-auth="false"] .nav-unauth { display: flex; align-items: center; gap: 4px; }
    .nav-account { position: relative; }
    .nav-account-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 13.5px;
      font-weight: 400;
      color: var(--ink-soft);
      padding: 6px 12px;
      border-radius: 5px;
      border: none;
      background: none;
      font-family: var(--ui);
      line-height: 1;
      cursor: pointer;
      transition: color 0.15s, background 0.15s;
      white-space: nowrap;
    }
    .nav-account-btn:hover { color: var(--ink); background: rgba(0,0,0,0.04); }
    .nav-account-btn[aria-expanded="true"] { color: var(--ink); background: rgba(0,0,0,0.04); }
    .nav-account-btn svg { transition: transform 0.18s ease; color: var(--ink-softer); }
    .nav-account-btn[aria-expanded="true"] svg { transform: rotate(180deg); color: var(--ink-soft); }
    .nav-dropdown {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      min-width: 148px;
      background: var(--card);
      border: 1px solid var(--rule);
      border-radius: 7px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
      overflow: hidden;
      opacity: 0;
      transform: translateY(-6px) scale(0.98);
      transform-origin: top right;
      pointer-events: none;
      transition: opacity 0.15s ease, transform 0.15s ease;
    }
    .nav-dropdown.open { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }
    .nav-dropdown-item {
      display: flex;
      align-items: center;
      gap: 9px;
      width: 100%;
      padding: 10px 14px;
      font-family: var(--ui);
      font-size: 13.5px;
      font-weight: 400;
      color: var(--ink-soft);
      background: none;
      border: none;
      text-decoration: none;
      cursor: pointer;
      text-align: left;
      transition: background 0.12s, color 0.12s;
      white-space: nowrap;
    }
    .nav-dropdown-item:hover { background: var(--bg); color: var(--ink); }
    .nav-dropdown-item svg { color: var(--ink-softer); flex-shrink: 0; }
    .nav-dropdown-item:hover svg { color: var(--ink-soft); }
    .nav-dropdown-divider { height: 1px; background: var(--rule-soft); margin: 2px 0; }
    .nav-dropdown-item--signout:hover { color: #a83a2a; background: rgba(168,58,42,0.05); }
    .nav-dropdown-item--signout:hover svg { color: #a83a2a; }

    /* ── FOOTER ── */
    .skept-footer {
      border-top: 1px solid var(--rule);
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .footer-logo {
      display: flex;
      align-items: center;
      gap: 9px;
      text-decoration: none;
      color: var(--ink-softer);
    }
    .footer-logo svg { display: block; color: var(--ink-softer); }
    .footer-wordmark {
      font-family: var(--goudy);
      font-style: italic;
      font-size: 16px;
      color: var(--ink-softer);
      line-height: 1;
      letter-spacing: -0.01em;
    }
    .footer-copy { font-size: 12px; color: var(--ink-softer); letter-spacing: 0.01em; }
    main { max-width: 560px; margin: 0 auto; padding: 48px 24px 96px; }
    h1 { font-size: 26px; font-weight: 600; margin-bottom: 32px; }
    .section {
      background: white; border: 1px solid var(--rule); border-radius: 8px;
      padding: 20px 22px; margin-bottom: 16px;
    }
    .section-title {
      font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--soft); margin-bottom: 16px;
    }
    .field-row { margin-bottom: 14px; }
    label { display: block; font-size: 13px; font-weight: 600; color: var(--gray); margin-bottom: 6px; }
    input[type="text"] {
      width: 100%; padding: 10px 12px;
      border: 1.5px solid var(--rule); border-radius: 6px;
      font-family: Calibri, Arial, sans-serif; font-size: 14px; color: var(--ink);
      background: white; outline: none; transition: border-color 0.15s;
    }
    input[type="text"]:focus { border-color: var(--amber); }
    .readonly-val { font-size: 14px; color: var(--gray); padding: 2px 0; }
    .btn {
      display: inline-block; padding: 10px 20px;
      border-radius: 6px; font-family: Calibri, Arial, sans-serif;
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: all 0.15s; border: 1.5px solid var(--ink);
      background: var(--ink); color: white;
    }
    .btn:hover { opacity: 0.85; }
    .btn.secondary {
      background: none; color: var(--ink);
    }
    .btn.secondary:hover { background: var(--ink); color: white; }
    .btn.danger {
      border-color: var(--red); background: none; color: var(--red);
    }
    .btn.danger:hover { background: var(--red); color: white; }
    .btn.ghost {
      border-color: var(--rule); background: none; color: var(--soft);
    }
    .btn.ghost:hover { border-color: var(--gray); color: var(--ink); }
    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .error-box {
      display: none; padding: 12px 14px; margin-bottom: 16px;
      background: var(--red-bg); border: 1px solid #C0392B30;
      border-radius: 6px; font-size: 13px; color: var(--red);
    }
    .success-box {
      display: none; padding: 12px 14px; margin-bottom: 16px;
      background: var(--green-bg); border: 1px solid #2D7A4F30;
      border-radius: 6px; font-size: 13px; color: var(--green);
    }
  </style>
</head>
<body data-auth="true">

<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <symbol id="skept-mark" viewBox="0 0 100 100">
      <rect x="29.7" y="64.3" width="30" height="12" rx="6"
            transform="rotate(135, 29.7, 70.3)" fill="currentColor"/>
      <circle cx="58" cy="42" r="40" fill="currentColor"/>
      <circle cx="58" cy="42" r="35" fill="#2a2a2a"/>
      <text x="57" y="62" font-family="'Sorts Mill Goudy', serif"
            font-style="italic" font-size="62" text-anchor="middle"
            fill="#faf8f3">S</text>
    </symbol>
  </defs>
</svg>

<nav class="skept-nav" aria-label="Main navigation">
  <a class="nav-logo" href="/">
    <svg width="26" height="26" aria-hidden="true"><use href="#skept-mark"/></svg>
    <span class="nav-wordmark">Skept</span>
  </a>
  <div class="nav-spacer"></div>
  <div class="nav-links nav-auth">
    <a class="nav-link" href="/how-it-works">How it works</a>
    <a class="nav-link" href="/verify">Check a video</a>
    <a class="nav-link" href="/history">History</a>
    <div class="nav-account">
      <button class="nav-account-btn" aria-haspopup="true" aria-expanded="false"
              aria-controls="account-dropdown" id="account-btn">
        Account
        <svg width="11" height="11" viewBox="0 0 11 11" fill="none" aria-hidden="true">
          <path d="M2 4l3.5 3.5L9 4" stroke="currentColor" stroke-width="1.5"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="nav-dropdown" id="account-dropdown" role="menu" aria-labelledby="account-btn">
        <a class="nav-dropdown-item" href="/settings" role="menuitem">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
            <circle cx="7" cy="7" r="2.2" stroke="currentColor" stroke-width="1.3"/>
            <path d="M7 1v1.2M7 11.8V13M1 7h1.2M11.8 7H13M2.75 2.75l.85.85M10.4 10.4l.85.85M11.25 2.75l-.85.85M3.6 10.4l-.85.85"
                  stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
          Settings
        </a>
        <div class="nav-dropdown-divider" role="separator"></div>
        <button class="nav-dropdown-item nav-dropdown-item--signout" role="menuitem" id="signout-btn">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
            <path d="M5.5 2H3a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h2.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            <path d="M9.5 9.5L12 7l-2.5-2.5M12 7H5.5" stroke="currentColor" stroke-width="1.3"
                  stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Sign out
        </button>
      </div>
    </div>
  </div>
  <div class="nav-links nav-unauth">
    <a class="nav-link" href="/how-it-works">How it works</a>
    <a class="nav-link nav-link--signin" href="/signin">Sign in</a>
  </div>
</nav>

<main>
  <h1>Settings</h1>

  <div class="error-box" id="error-box"></div>
  <div class="success-box" id="success-box"></div>

  <div class="section">
    <div class="section-title">Account</div>
    <div class="field-row">
      <label for="display-name">Display name</label>
      <input type="text" id="display-name" placeholder="Your name" maxlength="64">
    </div>
    <div class="field-row">
      <label>Email</label>
      <div class="readonly-val" id="email-display">—</div>
    </div>
    <div class="field-row">
      <label>Plan</label>
      <div class="readonly-val" id="tier-display">—</div>
    </div>
    <button class="btn" id="save-btn">Save</button>
  </div>

  <div class="section">
    <div class="section-title">Data</div>
    <div class="btn-row">
      <button class="btn secondary" id="export-btn">Export my data</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Session</div>
    <div class="btn-row">
      <button class="btn ghost" id="logout-btn">Sign out</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Danger zone</div>
    <div class="btn-row">
      <button class="btn danger" id="delete-btn">Delete account</button>
    </div>
  </div>
</main>

<script type="module" src="/src/pages/settings.js"></script>

<footer class="skept-footer">
  <a class="footer-logo" href="/">
    <svg width="20" height="20" aria-hidden="true"><use href="#skept-mark"/></svg>
    <span class="footer-wordmark">Skept</span>
  </a>
  <span class="footer-copy">© 2026 Skept</span>
</footer>

<script>
  /* ── Account dropdown ── */
  const accountBtn = document.getElementById('account-btn');
  const dropdown   = document.getElementById('account-dropdown');

  function closeDropdown() {
    accountBtn.setAttribute('aria-expanded', 'false');
    dropdown.classList.remove('open');
  }
  function openDropdown() {
    accountBtn.setAttribute('aria-expanded', 'true');
    dropdown.classList.add('open');
  }

  accountBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    const isOpen = accountBtn.getAttribute('aria-expanded') === 'true';
    isOpen ? closeDropdown() : openDropdown();
  });

  document.addEventListener('click', () => closeDropdown());
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeDropdown(); });
  dropdown.addEventListener('click', (e) => e.stopPropagation());

  document.getElementById('signout-btn').addEventListener('click', () => {
    closeDropdown();
    fetch('/api/auth/logout', { method: 'POST', credentials: 'include' })
      .finally(() => { window.location.href = '/'; });
  });
</script>
</body>
</html>

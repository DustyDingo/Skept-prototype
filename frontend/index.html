<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skept — Sign in</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --amber: #DFB87B; --amber-light: #F5E6C8; --ink: #1A1A1A;
      --gray: #4A4A4A; --soft: #8A8A8A; --cream: #FAF8F5; --rule: #E0E0E0;
    }
    body {
      font-family: Calibri, Arial, sans-serif;
      background: var(--cream); color: var(--ink);
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 24px;
    }
    .card {
      width: 100%; max-width: 400px;
    }
    .wordmark {
      font-family: 'Palatino Linotype', Palatino, serif;
      font-style: italic; font-size: 32px; color: var(--amber);
      margin-bottom: 8px; display: block;
    }
    .tagline {
      font-size: 14px; color: var(--soft); margin-bottom: 40px;
    }
    label {
      display: block; font-size: 13px; font-weight: 600;
      color: var(--gray); margin-bottom: 8px;
    }
    input[type="email"] {
      width: 100%; padding: 12px 14px;
      border: 1.5px solid var(--rule); border-radius: 6px;
      font-family: Calibri, Arial, sans-serif; font-size: 15px;
      color: var(--ink); background: white; outline: none;
      transition: border-color 0.15s; margin-bottom: 14px;
    }
    input[type="email"]:focus { border-color: var(--amber); }
    input[type="email"]::placeholder { color: var(--soft); }
    .submit-btn {
      width: 100%; padding: 13px;
      background: var(--ink); color: white;
      border: none; border-radius: 6px;
      font-family: Calibri, Arial, sans-serif;
      font-size: 15px; font-weight: 600; cursor: pointer;
      transition: opacity 0.15s;
    }
    .submit-btn:hover { opacity: 0.85; }
    .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .error-box {
      display: none; margin-top: 14px; padding: 12px 14px;
      background: #FDECEA; border: 1px solid #C0392B30;
      border-radius: 6px; font-size: 13px; color: #C0392B;
    }
    .confirmation {
      display: none; text-align: center; padding: 32px 0;
    }
    .confirmation h2 {
      font-size: 20px; margin-bottom: 10px;
    }
    .confirmation p {
      font-size: 14px; color: var(--gray); line-height: 1.6;
    }
    .divider {
      height: 1px; background: var(--rule); margin: 36px 0;
    }
    .footer-note {
      font-size: 12px; color: var(--soft); text-align: center;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="wordmark">Skept</span>
    <p class="tagline">AI-content detection for short-form video.</p>

    <div id="signin-form">
      <label for="email">Email address</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required>
      <button class="submit-btn" id="submit-btn" type="submit">Send magic link</button>
      <div class="error-box" id="error-box"></div>
    </div>

    <div class="confirmation" id="confirmation">
      <h2>Check your inbox</h2>
      <p>We've sent a sign-in link to your email.<br>It expires in 15 minutes.</p>
    </div>

    <div class="divider"></div>
    <p class="footer-note">No password. Just a one-time link sent to your inbox.</p>
  </div>

  <script type="module" src="/src/pages/signin.js"></script>
</body>
</html>

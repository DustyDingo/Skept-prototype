<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skept — History</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --amber: #DFB87B; --amber-light: #F5E6C8; --ink: #1A1A1A;
      --gray: #4A4A4A; --soft: #8A8A8A; --cream: #FAF8F5; --rule: #E0E0E0;
      --green: #2D7A4F; --red: #C0392B; --red-bg: #FDECEA;
    }
    body { font-family: Calibri, Arial, sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; }
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(250,248,245,0.94); backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--rule); padding: 0 28px;
      height: 52px; display: flex; align-items: center; justify-content: space-between;
    }
    .wordmark {
      font-family: 'Palatino Linotype', Palatino, serif;
      font-style: italic; font-size: 22px; color: var(--amber); text-decoration: none;
    }
    .nav-right { display: flex; align-items: center; gap: 16px; }
    .nav-tier {
      font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--amber); border: 1px solid var(--amber); padding: 2px 8px; border-radius: 3px;
    }
    .nav-link { font-size: 13px; color: var(--gray); text-decoration: none; }
    .nav-link:hover { color: var(--ink); }
    main { max-width: 680px; margin: 0 auto; padding: 48px 24px 96px; }
    .page-header {
      display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 28px;
    }
    h1 { font-size: 26px; font-weight: 600; }
    .wipe-btn {
      display: none; padding: 8px 16px;
      border: 1.5px solid var(--red); border-radius: 6px;
      font-family: Calibri, Arial, sans-serif; font-size: 13px; font-weight: 600;
      color: var(--red); background: none; cursor: pointer; transition: all 0.15s;
    }
    .wipe-btn:hover { background: var(--red); color: white; }
    .error-box {
      display: none; padding: 12px 14px;
      background: var(--red-bg); border: 1px solid #C0392B30;
      border-radius: 6px; font-size: 13px; color: var(--red); margin-bottom: 16px;
    }
    #empty-state { display: none; font-size: 14px; color: var(--soft); padding: 32px 0; }

    .history-row {
      background: white; border: 1px solid var(--rule); border-radius: 8px;
      padding: 16px 18px; margin-bottom: 10px;
      display: grid; grid-template-columns: 1fr auto;
      grid-template-rows: auto auto; gap: 4px 12px;
    }
    .history-meta { display: flex; align-items: center; gap: 12px; grid-column: 1; }
    .history-verdict {
      font-size: 12px; font-weight: 700; padding: 2px 8px; border-radius: 3px;
    }
    .history-verdict.green { background: #EBF5EF; color: var(--green); }
    .history-verdict.amber { background: #FEF9EE; color: #8B6914; }
    .history-verdict.red   { background: var(--red-bg); color: var(--red); }
    .history-score { font-size: 13px; font-weight: 600; color: var(--gray); }
    .history-date  { font-size: 12px; color: var(--soft); margin-left: auto; }
    .history-url   { font-size: 12px; color: var(--soft); word-break: break-all; grid-column: 1; }
    .delete-btn {
      grid-column: 2; grid-row: 1 / 3; align-self: center;
      padding: 7px 14px; border: 1px solid var(--rule); border-radius: 5px;
      font-family: Calibri, Arial, sans-serif; font-size: 12px;
      color: var(--soft); background: none; cursor: pointer; transition: all 0.15s;
      white-space: nowrap;
    }
    .delete-btn:hover { border-color: var(--red); color: var(--red); }
  </style>
</head>
<body>
<nav>
  <a class="wordmark" href="/verify.html">Skept</a>
  <div class="nav-right">
    <span class="nav-tier" id="user-tier"></span>
    <a class="nav-link" href="/verify.html">Verify</a>
    <a class="nav-link" href="/settings.html">Settings</a>
  </div>
</nav>

<main>
  <div class="page-header">
    <h1>History</h1>
    <button class="wipe-btn" id="wipe-btn">Delete all</button>
  </div>

  <div class="error-box" id="error-box"></div>
  <div id="empty-state">No analyses yet. <a href="/verify.html">Verify a clip</a> to get started.</div>
  <div id="history-list"></div>
</main>

<script type="module" src="/src/pages/history.js"></script>
</body>
</html>

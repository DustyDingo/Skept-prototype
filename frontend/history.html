<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skept — History</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sorts+Mill+Goudy:ital,wght@0,400;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --amber:          #b87400;
      --amber-warm:     #c07800;
      --amber-soft:     rgba(184,116,0,0.09);
      --amber-border:   rgba(184,116,0,0.25);
      --ink:            #1a1a1a;
      --ink-soft:       #5a5a5a;
      --ink-softer:     #8a8a8a;
      --rule:           #e8e4db;
      --rule-soft:      #f0ece2;
      --bg:             #faf8f3;
      --card:           #ffffff;
      --goudy:          'Sorts Mill Goudy', Georgia, serif;
      --ui:             'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --green:          #3a7a50;
      --green-light:    #7aaa88;
      --amber-state:    #c07800;
      --red-state:      #a83a2a;
    }
    body {
      font-family: var(--ui); background: var(--bg); color: var(--ink);
      min-height: 100vh; display: flex; flex-direction: column;
    }

    /* ── NAV ── */
    .skept-nav {
      position: sticky;
      top: 0;
      z-index: 200;
      height: 56px;
      background: rgba(250,248,243,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--rule);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 0;
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 9px;
      text-decoration: none;
      color: var(--ink);
      flex-shrink: 0;
    }
    .nav-logo svg { display: block; color: var(--ink); }
    .nav-wordmark {
      font-family: var(--goudy);
      font-style: italic;
      font-size: 21px;
      line-height: 1;
      color: var(--ink);
      letter-spacing: -0.01em;
    }
    .nav-spacer { flex: 1; }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .nav-link {
      font-size: 13.5px;
      font-weight: 400;
      color: var(--ink-soft);
      text-decoration: none;
      padding: 6px 12px;
      border-radius: 5px;
      transition: color 0.15s, background 0.15s;
      white-space: nowrap;
      cursor: pointer;
      background: none;
      border: none;
      font-family: var(--ui);
      line-height: 1;
    }
    .nav-link:hover { color: var(--ink); background: rgba(0,0,0,0.04); }
    .nav-link.active { color: var(--amber); font-weight: 500; }
    .nav-link--signin {
      color: var(--ink);
      font-weight: 500;
      border: 1px solid var(--rule);
      background: var(--card);
    }
    .nav-link--signin:hover {
      border-color: var(--amber-border);
      background: var(--card);
      color: var(--ink);
    }
    .nav-auth   { display: none; }
    .nav-unauth { display: none; }
    body[data-auth="true"]  .nav-auth   { display: flex; align-items: center; gap: 4px; }
    body[data-auth="false"] .nav-unauth { display: flex; align-items: center; gap: 4px; }
    .nav-account { position: relative; }
    .nav-account-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 13.5px;
      font-weight: 400;
      color: var(--ink-soft);
      padding: 6px 12px;
      border-radius: 5px;
      border: none;
      background: none;
      font-family: var(--ui);
      line-height: 1;
      cursor: pointer;
      transition: color 0.15s, background 0.15s;
      white-space: nowrap;
    }
    .nav-account-btn:hover { color: var(--ink); background: rgba(0,0,0,0.04); }
    .nav-account-btn[aria-expanded="true"] { color: var(--ink); background: rgba(0,0,0,0.04); }
    .nav-account-btn svg { transition: transform 0.18s ease; color: var(--ink-softer); }
    .nav-account-btn[aria-expanded="true"] svg { transform: rotate(180deg); color: var(--ink-soft); }
    .nav-dropdown {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      min-width: 148px;
      background: var(--card);
      border: 1px solid var(--rule);
      border-radius: 7px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
      overflow: hidden;
      opacity: 0;
      transform: translateY(-6px) scale(0.98);
      transform-origin: top right;
      pointer-events: none;
      transition: opacity 0.15s ease, transform 0.15s ease;
    }
    .nav-dropdown.open { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }
    .nav-dropdown-item {
      display: flex;
      align-items: center;
      gap: 9px;
      width: 100%;
      padding: 10px 14px;
      font-family: var(--ui);
      font-size: 13.5px;
      font-weight: 400;
      color: var(--ink-soft);
      background: none;
      border: none;
      text-decoration: none;
      cursor: pointer;
      text-align: left;
      transition: background 0.12s, color 0.12s;
      white-space: nowrap;
    }
    .nav-dropdown-item:hover { background: var(--bg); color: var(--ink); }
    .nav-dropdown-item svg { color: var(--ink-softer); flex-shrink: 0; }
    .nav-dropdown-item:hover svg { color: var(--ink-soft); }
    .nav-dropdown-divider { height: 1px; background: var(--rule-soft); margin: 2px 0; }
    .nav-dropdown-item--signout:hover { color: #a83a2a; background: rgba(168,58,42,0.05); }
    .nav-dropdown-item--signout:hover svg { color: #a83a2a; }

    /* ── MAIN ── */
    main {
      max-width: 1080px; margin: 0 auto; padding: 40px 32px 80px;
      width: 100%; flex: 1;
    }

    /* ── QUOTA STRIP ── */
    .quota-strip { margin-bottom: 20px; }
    .quota-text { font-size: 13px; color: var(--ink-soft); margin-bottom: 6px; }
    .quota-text.limit-reached { color: var(--red-state); font-weight: 500; }
    .quota-bar-track { height: 3px; background: var(--rule); border-radius: 2px; overflow: hidden; }
    .quota-bar-fill { height: 100%; border-radius: 2px; background: var(--amber); transition: width 0.3s ease; }
    .quota-bar-fill.full { background: var(--red-state); }

    /* ── FILTER CHIPS ── */
    .filter-chips { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .chip {
      font-family: var(--ui); font-size: 10px; font-weight: 600;
      padding: 5px 12px; border-radius: 20px; cursor: pointer;
      border: 1px solid var(--rule); background: var(--card); color: var(--ink-soft);
      transition: all 0.12s;
    }
    .chip:hover { border-color: var(--ink-softer); color: var(--ink); }
    .chip.active { background: var(--amber); border-color: var(--amber); color: white; }

    /* ── HISTORY CARDS ── */
    .history-card {
      display: flex; align-items: stretch;
      background: var(--card); border: 1px solid var(--rule); border-radius: 6px;
      margin-bottom: 10px; overflow: hidden; cursor: pointer;
      transition: border-color 0.12s;
    }
    .history-card:hover { border-color: var(--ink-softer); }
    .verdict-bar { width: 3px; flex-shrink: 0; border-radius: 2px 0 0 2px; }
    .card-gap { width: 16px; flex-shrink: 0; }
    .card-body { flex: 1; padding: 14px 0; min-width: 0; }
    .card-platform {
      font-size: 13px; color: var(--ink-soft); margin-bottom: 4px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card-verdict { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .card-date { font-size: 12px; color: var(--ink-softer); }
    .card-actions {
      display: flex; align-items: center; gap: 8px;
      padding: 14px 16px 14px 12px; flex-shrink: 0;
    }
    .delete-btn {
      font-size: 18px; color: var(--ink-softer); background: none; border: none;
      cursor: pointer; line-height: 1; padding: 2px 4px; border-radius: 3px;
      transition: color 0.12s; flex-shrink: 0;
    }
    .delete-btn:hover { color: var(--red-state); }
    .card-chevron { font-size: 16px; color: var(--ink-softer); pointer-events: none; }

    /* ── CONFIRM ROW ── */
    .confirm-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; padding: 2px 0; }
    .confirm-label { font-size: 13px; color: var(--ink-soft); }
    .confirm-yes {
      font-family: var(--ui); font-size: 12px; font-weight: 600; padding: 4px 10px;
      background: var(--red-state); color: white; border: none; border-radius: 4px; cursor: pointer;
    }
    .confirm-no {
      font-family: var(--ui); font-size: 12px; color: var(--ink-soft); background: none;
      border: 1px solid var(--rule); border-radius: 4px; padding: 4px 10px; cursor: pointer;
    }
    .confirm-no:hover { border-color: var(--ink-softer); }
    .sealed-msg { font-size: 13px; color: var(--red-state); font-style: italic; }

    /* ── SKELETON ── */
    .skeleton-card {
      background: var(--card); border: 1px solid var(--rule); border-radius: 6px;
      height: 72px; margin-bottom: 10px; overflow: hidden;
    }
    .shimmer {
      height: 100%;
      background: linear-gradient(90deg, var(--rule) 25%, #f0ece2 50%, var(--rule) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── ERROR BANNER ── */
    .error-banner {
      display: none;
      background: rgba(184,116,0,0.08); border: 1px solid rgba(184,116,0,0.25);
      border-radius: 6px; padding: 14px 18px;
      font-size: 13px; color: var(--amber-warm);
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      display: none; flex-direction: column; align-items: center;
      padding: 80px 0; text-align: center;
    }
    .empty-state.visible { display: flex; }
    .empty-icon { color: var(--ink-softer); margin-bottom: 20px; }
    .empty-heading {
      font-family: var(--goudy); font-style: italic; font-size: 22px;
      color: var(--ink); margin-bottom: 10px;
    }
    .empty-sub { font-size: 14px; color: var(--ink-soft); margin-bottom: 16px; }
    .empty-cta { font-size: 14px; color: var(--amber); text-decoration: none; }
    .empty-cta:hover { text-decoration: underline; }

    /* ── FOOTER ── */
    .skept-footer {
      border-top: 1px solid var(--rule);
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .footer-logo {
      display: flex;
      align-items: center;
      gap: 9px;
      text-decoration: none;
      color: var(--ink-softer);
    }
    .footer-logo svg { display: block; color: var(--ink); }
    .footer-wordmark {
      font-family: var(--goudy);
      font-style: italic;
      font-size: 16px;
      color: var(--ink-softer);
      line-height: 1;
      letter-spacing: -0.01em;
    }
    .footer-copy { font-size: 12px; color: var(--ink-softer); letter-spacing: 0.01em; }

    /* ── MOBILE ── */
    @media (max-width: 640px) {
      main   { padding: 32px 16px 64px; }
    }
  </style>
</head>
<body data-auth="true">

<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <symbol id="skept-mark" viewBox="0 0 100 100">
      <rect x="29.7" y="64.3" width="30" height="12" rx="6"
            transform="rotate(135, 29.7, 70.3)" fill="currentColor"/>
      <circle cx="58" cy="42" r="40" fill="currentColor"/>
      <circle cx="58" cy="42" r="35" fill="#2a2a2a"/>
      <text x="57" y="62" font-family="'Sorts Mill Goudy', serif"
            font-style="italic" font-size="62" text-anchor="middle"
            fill="#faf8f3">S</text>
    </symbol>
  </defs>
</svg>

<nav class="skept-nav" aria-label="Main navigation">
  <a class="nav-logo" href="/">
    <svg width="26" height="26" aria-hidden="true"><use href="#skept-mark"/></svg>
    <span class="nav-wordmark">Skept</span>
  </a>
  <div class="nav-spacer"></div>
  <div class="nav-links nav-auth">
    <a class="nav-link" href="/how-it-works">How it works</a>
    <a class="nav-link" href="/verify">Check a video</a>
    <a class="nav-link active" href="/history">History</a>
    <div class="nav-account">
      <button class="nav-account-btn" aria-haspopup="true" aria-expanded="false"
              aria-controls="account-dropdown" id="account-btn">
        Account
        <svg width="11" height="11" viewBox="0 0 11 11" fill="none" aria-hidden="true">
          <path d="M2 4l3.5 3.5L9 4" stroke="currentColor" stroke-width="1.5"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="nav-dropdown" id="account-dropdown" role="menu" aria-labelledby="account-btn">
        <a class="nav-dropdown-item" href="/settings" role="menuitem">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
            <circle cx="7" cy="7" r="2.2" stroke="currentColor" stroke-width="1.3"/>
            <path d="M7 1v1.2M7 11.8V13M1 7h1.2M11.8 7H13M2.75 2.75l.85.85M10.4 10.4l.85.85M11.25 2.75l-.85.85M3.6 10.4l-.85.85"
                  stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
          Settings
        </a>
        <div class="nav-dropdown-divider" role="separator"></div>
        <button class="nav-dropdown-item nav-dropdown-item--signout" role="menuitem" id="signout-btn">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
            <path d="M5.5 2H3a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h2.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            <path d="M9.5 9.5L12 7l-2.5-2.5M12 7H5.5" stroke="currentColor" stroke-width="1.3"
                  stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Sign out
        </button>
      </div>
    </div>
  </div>
  <div class="nav-links nav-unauth">
    <a class="nav-link" href="/how-it-works">How it works</a>
    <a class="nav-link nav-link--signin" href="/signin">Sign in</a>
  </div>
</nav>

<main>
  <div class="quota-strip" id="quota-strip" style="display:none">
    <div class="quota-text" id="quota-text"></div>
    <div class="quota-bar-track">
      <div class="quota-bar-fill" id="quota-bar-fill" style="width:0%"></div>
    </div>
  </div>

  <div class="filter-chips" id="filter-chips" style="display:none">
    <button class="chip active" data-filter="All">All</button>
    <button class="chip" data-filter="Suspicious">Suspicious</button>
    <button class="chip" data-filter="Ambiguous">Ambiguous</button>
    <button class="chip" data-filter="Authentic">Authentic</button>
  </div>

  <div class="error-banner" id="error-banner">Couldn't load history — try refreshing.</div>

  <div id="history-list"></div>

  <div class="empty-state" id="empty-state">
    <svg class="empty-icon" width="48" height="48"><use href="#skept-mark"/></svg>
    <div class="empty-heading" id="empty-heading">Nothing here yet</div>
    <p class="empty-sub" id="empty-sub">Check a video to see your history appear here.</p>
    <a class="empty-cta" id="empty-cta" href="/verify.html">Check a video →</a>
  </div>
</main>

<footer class="skept-footer">
  <a class="footer-logo" href="/">
    <svg width="20" height="20" aria-hidden="true"><use href="#skept-mark"/></svg>
    <span class="footer-wordmark">Skept</span>
  </a>
  <span class="footer-copy">© 2026 Skept</span>
</footer>

<script type="module" src="/src/history.js"></script>
<script>
  /* ── Account dropdown ── */
  const accountBtn = document.getElementById('account-btn');
  const dropdown   = document.getElementById('account-dropdown');

  function closeDropdown() {
    accountBtn.setAttribute('aria-expanded', 'false');
    dropdown.classList.remove('open');
  }
  function openDropdown() {
    accountBtn.setAttribute('aria-expanded', 'true');
    dropdown.classList.add('open');
  }

  accountBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    const isOpen = accountBtn.getAttribute('aria-expanded') === 'true';
    isOpen ? closeDropdown() : openDropdown();
  });

  document.addEventListener('click', () => closeDropdown());
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeDropdown(); });
  dropdown.addEventListener('click', (e) => e.stopPropagation());

  document.getElementById('signout-btn').addEventListener('click', () => {
    closeDropdown();
    fetch('/api/auth/logout', { method: 'POST', credentials: 'include' })
      .finally(() => { window.location.href = '/'; });
  });
</script>
</body>
</html>

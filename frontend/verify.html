<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skept — Verify</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --amber: #DFB87B; --amber-light: #F5E6C8; --ink: #1A1A1A;
      --gray: #4A4A4A; --soft: #8A8A8A; --cream: #FAF8F5; --rule: #E0E0E0;
      --green: #2D7A4F; --green-bg: #EBF5EF; --red: #C0392B; --red-bg: #FDECEA;
      --amber-bg: #FEF9EE;
    }
    body { font-family: Calibri, Arial, sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; }
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(250,248,245,0.94); backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--rule); padding: 0 28px;
      height: 52px; display: flex; align-items: center; justify-content: space-between;
    }
    .wordmark {
      font-family: 'Palatino Linotype', Palatino, serif;
      font-style: italic; font-size: 22px; color: var(--amber); text-decoration: none;
    }
    .nav-right { display: flex; align-items: center; gap: 16px; }
    .nav-tier {
      font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--amber); border: 1px solid var(--amber); padding: 2px 8px; border-radius: 3px;
    }
    .nav-link { font-size: 13px; color: var(--gray); text-decoration: none; }
    .nav-link:hover { color: var(--ink); }
    main { max-width: 680px; margin: 0 auto; padding: 48px 24px 96px; }
    h1 { font-size: 26px; font-weight: 600; margin-bottom: 6px; }
    .sub { font-size: 14px; color: var(--soft); margin-bottom: 32px; }
    .url-row { display: flex; gap: 10px; margin-bottom: 8px; }
    input[type="url"] {
      flex: 1; padding: 12px 14px;
      border: 1.5px solid var(--rule); border-radius: 6px;
      font-family: Calibri, Arial, sans-serif; font-size: 14px; color: var(--ink);
      background: white; outline: none; transition: border-color 0.15s;
    }
    input[type="url"]:focus { border-color: var(--amber); }
    input[type="url"]::placeholder { color: var(--soft); }
    .check-btn {
      padding: 12px 24px; background: var(--ink); color: white;
      border: none; border-radius: 6px;
      font-family: Calibri, Arial, sans-serif; font-size: 14px; font-weight: 600;
      cursor: pointer; white-space: nowrap; transition: opacity 0.15s;
    }
    .check-btn:hover { opacity: 0.85; }
    .check-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .platform-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      font-size: 11px; color: var(--soft);
      border: 1px solid var(--rule); padding: 3px 9px; border-radius: 20px;
    }
    .error-box {
      display: none; margin-top: 14px; padding: 12px 14px;
      background: var(--red-bg); border: 1px solid #C0392B30;
      border-radius: 6px; font-size: 13px; color: var(--red);
    }

    /* Loading */
    #view-loading { display: none; }
    .loading-label { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
    .loading-sub { font-size: 13px; color: var(--soft); margin-bottom: 28px; }
    .spinner {
      width: 40px; height: 40px; border: 3px solid var(--rule);
      border-top-color: var(--amber); border-radius: 50%;
      animation: spin 0.9s linear infinite; margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Result */
    #view-result { display: none; }
    .verdict-band {
      padding: 22px 24px; border-radius: 10px; margin-bottom: 24px;
    }
    .verdict-band.green { background: var(--green-bg); border: 1.5px solid #2D7A4F30; }
    .verdict-band.amber { background: var(--amber-bg); border: 1.5px solid #DFB87B50; }
    .verdict-band.red   { background: var(--red-bg);   border: 1.5px solid #C0392B30; }
    .verdict-label { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .green .verdict-label { color: var(--green); }
    .amber .verdict-label { color: #8B6914; }
    .red   .verdict-label { color: var(--red); }
    .verdict-url { font-size: 12px; color: var(--soft); word-break: break-all; }

    .score-section { margin-bottom: 24px; }
    .score-row {
      display: flex; justify-content: space-between;
      font-size: 12px; color: var(--soft); margin-bottom: 6px;
    }
    .score-bar {
      height: 6px; background: var(--rule); border-radius: 3px; overflow: hidden;
    }
    .score-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
    .score-fill.green { background: var(--green); }
    .score-fill.amber { background: var(--amber); }
    .score-fill.red   { background: var(--red); }

    .pillars-section h3 {
      font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--soft); margin-bottom: 10px; padding-bottom: 6px;
      border-bottom: 1px solid var(--rule);
    }
    .pillar-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0; border-bottom: 1px solid var(--rule); font-size: 14px;
    }
    .pillar-row:last-child { border-bottom: none; }
    .pillar-name { color: var(--gray); }
    .pillar-score { font-weight: 600; }
    .pillar-score.green { color: var(--green); }
    .pillar-score.amber { color: #8B6914; }
    .pillar-score.red   { color: var(--red); }
    .pillar-score.soft  { color: var(--soft); }

    .retry-btn {
      display: inline-block; margin-top: 24px;
      padding: 11px 22px; border: 1.5px solid var(--ink); border-radius: 6px;
      font-family: Calibri, Arial, sans-serif; font-size: 13px; font-weight: 600;
      color: var(--ink); background: none; cursor: pointer;
      transition: all 0.15s; text-decoration: none;
    }
    .retry-btn:hover { background: var(--ink); color: white; }
  </style>
</head>
<body>
<nav>
  <a class="wordmark" href="/verify.html">Skept</a>
  <div class="nav-right">
    <span class="nav-tier" id="user-tier"></span>
    <a class="nav-link" href="/history.html">History</a>
    <a class="nav-link" href="/settings.html">Settings</a>
  </div>
</nav>

<main>
  <div id="view-intake">
    <h1>Verify a clip</h1>
    <p class="sub">Paste a TikTok, Instagram, YouTube, X or Discord link.</p>

    <form id="verify-form">
      <div class="url-row">
        <input type="url" id="url-input" placeholder="https://www.tiktok.com/@…" autocomplete="off" required>
        <button type="submit" class="check-btn" id="check-btn">Check it</button>
      </div>
      <div class="platform-chips">
        <span class="chip">TikTok</span>
        <span class="chip">Instagram</span>
        <span class="chip">YouTube Shorts</span>
        <span class="chip">X / Twitter</span>
        <span class="chip">Bluesky</span>
        <span class="chip">Discord CDN</span>
      </div>
    </form>

    <div class="error-box" id="error-box"></div>
  </div>

  <div id="view-loading">
    <div class="spinner"></div>
    <div class="loading-label">Analysing…</div>
    <div class="loading-sub">This usually takes 15–30 seconds.</div>
  </div>

  <div id="view-result">
    <div class="verdict-band amber" id="verdict-band">
      <div class="verdict-label" id="verdict-label"></div>
      <div class="verdict-url" id="verdict-url"></div>
    </div>

    <div class="score-section">
      <div class="score-row">
        <span>Authentic</span>
        <span id="score-pct"></span>
        <span>Manipulated</span>
      </div>
      <div class="score-bar">
        <div class="score-fill amber" id="score-bar-fill" style="width:0%"></div>
      </div>
    </div>

    <div class="pillars-section">
      <h3>Evidence</h3>
      <div id="pillars"></div>
    </div>

    <button class="retry-btn" id="analyse-another">← Verify another clip</button>
  </div>
</main>

<script type="module" src="/src/pages/verify.js"></script>
</body>
</html>
